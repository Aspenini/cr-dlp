name: Crystal Rewrite

on:
  push:
    paths:
      - "baseline/crystal/**"
      - "devscripts/export_crystal_baseline.py"
      - "devscripts/differential_crystal.py"
      - "devscripts/differential_jsinterp.py"
      - "shard.yml"
      - "spec/**"
      - "src/**"
      - ".github/workflows/crystal.yml"
  pull_request:
    paths:
      - "baseline/crystal/**"
      - "devscripts/export_crystal_baseline.py"
      - "devscripts/differential_crystal.py"
      - "devscripts/differential_jsinterp.py"
      - "shard.yml"
      - "spec/**"
      - "src/**"
      - ".github/workflows/crystal.yml"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.20.0
      - name: Install SQLite development files
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Run Crystal deterministic gate
        run: python devscripts/crystal_test_gate.py --release --differential --report artifacts/crystal-test-gate.json
      - name: Verify generated baseline
        run: |
          python devscripts/export_crystal_baseline.py
          git diff --exit-code -- baseline/crystal
